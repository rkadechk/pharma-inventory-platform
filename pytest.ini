[pytest]
# Pytest Configuration for Pharma Inventory Platform

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Test markers
markers =
    unit: Unit tests (agents, validators)
    integration: Integration tests (full pipeline flow)
    performance: Performance tests (execution time, memory)
    slow: Slow tests (>5 seconds)

# Output and reporting
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra
    --cov=agents
    --cov=validators
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=85

# Minimum coverage thresholds
# Overall: 85%, per-module: check in --cov-report

# Timeout for slow tests
timeout = 300

# Distance metrics
minversion = 7.0
